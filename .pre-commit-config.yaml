repos:
  # ------------------------------------------------------------------
  # Standard Hygiene Hooks
  # ------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-added-large-files

  # ------------------------------------------------------------------
  # Secrets Detection
  # ------------------------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # ------------------------------------------------------------------
  # Markdown Formatting (Prettier)
  # ------------------------------------------------------------------
  - repo: local
    hooks:
      - id: prettier-markdown
        name: prettier (markdown)
        entry: npx prettier@3.5.3 --write --prose-wrap=always
        language: system
        types: [markdown]

  # ------------------------------------------------------------------
  # Go Linting + Formatting
  # ------------------------------------------------------------------
  - repo: https://github.com/golangci/golangci-lint
    rev: v2.12.0
    hooks:
      - id: golangci-lint
        args: [--fix]

  - repo: https://github.com/tekwizely/pre-commit-golang
    rev: v1.0.0-rc.4
    hooks:
      # Format Go code
      - id: go-fmt
        args: [-w]
      # Run go mod tidy
      - id: go-mod-tidy

  # ------------------------------------------------------------------
  # Unit Tests
  # ------------------------------------------------------------------
  - repo: local
    hooks:
      - id: go-test
        name: go test
        entry: go test -v ./...
        language: system
        pass_filenames: false
        types: [go]
